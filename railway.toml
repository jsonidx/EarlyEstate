[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn app.api.main:app --host 0.0.0.0 --port $PORT --workers 2"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Required secrets to configure in Railway dashboard:
#   DATABASE_URL          — asyncpg connection string (postgresql+asyncpg://...)
#   TELEGRAM_BOT_TOKEN    — optional, for alert delivery
#   TELEGRAM_CHAT_ID      — optional
#   NORTH_DATA_API_KEY    — optional, for COMPANY enrichment
