name: Rescore All Matches

on:
  workflow_dispatch:

# Re-runs the full match + alert pipeline against all parties.
# Use this after scoring changes (new signals, weight adjustments) to
# update existing match_candidate scores without waiting for the next
# scheduled bank_portals run.

jobs:
  rescore:
    name: Rescore all match candidates
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Wipe stale matches + rescore with new weights
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          NORTH_DATA_API_KEY: ${{ secrets.NORTH_DATA_API_KEY }}
          GEOCODING_PROVIDER: nominatim
          NOMINATIM_USER_AGENT: EarlyEstate/0.1-GHA
        run: python -m app.jobs.run_once --source match_alert --wipe-matches --lookback-hours 0
