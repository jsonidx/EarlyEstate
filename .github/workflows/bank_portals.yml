name: Bank Portals Screener

on:
  schedule:
    # Daily at 06:00 UTC — bank portals update slowly
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      pages:
        description: 'Number of listing pages to scrape per portal'
        default: '5'
        required: false

jobs:
  scrape-sparkasse:
    name: Scrape Sparkasse Immobilien
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Scrape Sparkasse listings
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_SYNC: ${{ secrets.DATABASE_URL_SYNC }}
          GEOCODING_PROVIDER: nominatim
          NOMINATIM_USER_AGENT: EarlyEstate/0.1-GHA
        run: |
          python -m app.jobs.run_once \
            --source sparkasse_immobilien \
            --pages ${{ github.event.inputs.pages || '5' }}

  scrape-lbs:
    name: Scrape LBS Immobilien
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Scrape LBS listings
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_SYNC: ${{ secrets.DATABASE_URL_SYNC }}
          GEOCODING_PROVIDER: nominatim
          NOMINATIM_USER_AGENT: EarlyEstate/0.1-GHA
        run: |
          python -m app.jobs.run_once \
            --source lbs_immobilien \
            --pages ${{ github.event.inputs.pages || '5' }}

  match-and-alert:
    name: Match + alert after bank scrape
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [scrape-sparkasse, scrape-lbs]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run matching + send alerts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          GEOCODING_PROVIDER: nominatim
          NOMINATIM_USER_AGENT: EarlyEstate/0.1-GHA
        run: python -m app.jobs.run_once --source match_alert
