name: Bank Portals Screener

on:
  schedule:
    # Daily at 07:00 UTC
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  scrape-immowelt:
    name: Scrape Immowelt ZV listings
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Seed sources (idempotent)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m app.jobs.run_once --seed

      - name: Scrape Immowelt ZV listings
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_SYNC: ${{ secrets.DATABASE_URL_SYNC }}
          GEOCODING_PROVIDER: nominatim
          NOMINATIM_USER_AGENT: EarlyEstate/0.1-GHA
        run: python -m app.jobs.run_once --source immowelt_zv

  match-and-alert:
    name: Match + alert after scrape
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [scrape-immowelt]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run matching + send alerts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          GEOCODING_PROVIDER: nominatim
          NOMINATIM_USER_AGENT: EarlyEstate/0.1-GHA
        run: python -m app.jobs.run_once --source match_alert
