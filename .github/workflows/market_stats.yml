name: Market Stats

on:
  schedule:
    # Run nightly at 03:00 Berlin time — after bank_portals has ingested new listings
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update:
    name: Rebuild PLZ market stats
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Rebuild PLZ market stats
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_SYNC: ${{ secrets.DATABASE_URL_SYNC }}
        run: python -m app.jobs.run_once --job-type market_stats
