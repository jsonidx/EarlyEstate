name: DB Migrate

on:
  workflow_dispatch: {}   # Manual trigger only — run once after Supabase setup

jobs:
  migrate:
    name: Run Alembic migrations
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Migrate
        env:
          DATABASE_URL_SYNC: ${{ secrets.DATABASE_URL_SYNC }}
        run: python -m app.jobs.run_once --migrate

      - name: Seed sources
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_SYNC: ${{ secrets.DATABASE_URL_SYNC }}
        run: python -m app.jobs.run_once --seed
