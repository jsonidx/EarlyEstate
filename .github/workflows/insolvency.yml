name: Insolvency Screener

on:
  schedule:
    # Every 2 hours — stays within GitHub free tier (2,000 min/month private repo)
    # For 30-min cadence: change to '*/30 * * * *' and make repo public (unlimited)
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: 'Hours to look back'
        default: '2'
        required: false

jobs:
  scrape:
    name: Scrape insolvency publications
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run DB migrations (idempotent)
        env:
          DATABASE_URL_SYNC: ${{ secrets.DATABASE_URL_SYNC }}
        run: python -m app.jobs.run_once --migrate

      - name: Seed sources (idempotent)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m app.jobs.run_once --seed

      - name: Scrape insolvency portal
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_SYNC: ${{ secrets.DATABASE_URL_SYNC }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEOCODING_PROVIDER: nominatim
          NOMINATIM_USER_AGENT: EarlyEstate/0.1-GHA
        run: |
          python -m app.jobs.run_once \
            --source insolvency_portal \
            --lookback-hours ${{ github.event.inputs.lookback_hours || '2' }}

      - name: Run matching + send alerts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          GEOCODING_PROVIDER: nominatim
          NOMINATIM_USER_AGENT: EarlyEstate/0.1-GHA
        run: python -m app.jobs.run_once --source match_alert
